<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arcade Runner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.55.2/phaser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #030509; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
let playerName = "PLAYER";
let highScore = localStorage.getItem('neonRunnerHighScore') || 0;
let highScorePlayer = localStorage.getItem('neonRunnerHighPlayer') || "PLAYER";
let audioCtx, musicInterval, buildingsSpawnedCount = 0, currentTrackIndex = 0, currentSkinIndex = 0, currentMapIndex = 0;

const SKINS = ["OFICINISTA", "DEPORTIVO", "NINJA"];
const MAPS = [
    { name: "NY NIGHT", bgColor: '#05020a', bColor: 0x0a0f1c, winColor: 0xffd966, topColor: 0x00ffff, obsBox: 0x151922, obsLine: 0x00ffff },
    { name: "DESIERTO", bgColor: '#e37042', bColor: 0x964d22, winColor: 0xff9933, topColor: 0xff5500, obsBox: 0x3d2314, obsLine: 0xffaa00 },
    { name: "FÁBRICA", bgColor: '#1f2226', bColor: 0x2d3238, winColor: 0x00ffcc, topColor: 0xff8800, obsBox: 0x1a1c1e, obsLine: 0xff8800 }
];

const PLAYLIST = [
    {name:"LIFE GOES ON (Oliver Tree)",bpm:140,notes:[64,64,66,67,69,67,66,64,62,62,64,66,67,66,64,62]},
    {name:"BETTER OFF ALONE (Alice Deejay)",bpm:135,notes:[69,72,74,72,76,72,74,72,67,71,72,71,74,71,72,71]},
    {name:"SANDSTORM (Darude)",bpm:140,notes:[71,71,71,71,71,76,71,71,71,71,71,71,71,74,74,74,74,74]},
    {name:"CHILDREN (Robert Miles)",bpm:130,notes:[66,68,69,73,71,66,64,66,66,68,69,73,71,76,74,73]},
    {name:"SATISFACTION (Benny Benassi)",bpm:133,notes:[57,57,60,57,57,57,62,57,57,57,60,57,55,55,57,57]},
    {name:"PUMP UP THE JAM (Technotronic)",bpm:125,notes:[60,63,60,65,63,60,60,63,65,65,63,60,58,58,60,60]}
];

class MainMenu extends Phaser.Scene {
    constructor() { super({ key: 'MainMenu' }); }
    
    create() {
        this.cameras.main.setBackgroundColor('#05020a');
        let art = this.add.graphics();
        art.fillStyle(0xff0055, 0.15).fillTriangle(0, 0, 450, 0, 0, 450);
        art.fillStyle(0x00ffff, 0.1).fillTriangle(800, 450, 350, 450, 800, 0);
        art.lineStyle(4, 0xff00ff, 0.3).lineBetween(450, 0, 0, 450).lineBetween(350, 450, 800, 0);
        
        this.add.text(400, 50, 'ARCADE RUNNER', { fontSize: '42px', fill: '#f3ef12', fontFamily: 'Impact', stroke: '#000000', strokeThickness: 8 }).setOrigin(0.5);
        this.add.text(400, 100, `RECORD: ${highScore} PTS (${highScorePlayer})`, { fontSize: '15px', fill: '#00ffff', fontWeight: 'bold', backgroundColor: '#111', padding: 5 }).setOrigin(0.5);
        
        let nBtn = this.add.text(400, 150, ` [ OPERADOR: ${playerName} ] `, { fontSize: '15px', fill: '#ffffff', backgroundColor: '#1c122c', padding: 6 }).setOrigin(0.5).setInteractive();
        nBtn.on('pointerdown', () => { 
            let i = prompt("Tu nombre:", playerName); 
            if (i && i.trim() !== "") { 
                playerName = i.substring(0, 10).toUpperCase(); 
                nBtn.setText(` [ OPERADOR: ${playerName} ] `); 
            } 
        });
        
        this.skTxt = this.add.text(400, 195, `SKIN: ${SKINS[currentSkinIndex]} | MAPA: ${MAPS[currentMapIndex].name}`, { fontSize: '12px', fill: '#aaa' }).setOrigin(0.5);
        
        let sBtn = this.add.text(400, 235, '👕 SELECCIONAR APARIENCIA', { fontSize: '15px', fill: '#ffffff', backgroundColor: '#3a0625', padding: 8 }).setOrigin(0.5).setInteractive();
        sBtn.on('pointerdown', () => this.openSkinModal());
        
        let mBtn = this.add.text(400, 285, '🗺️ SELECCIONAR MAPA', { fontSize: '15px', fill: '#ffffff', backgroundColor: '#093a26', padding: 8 }).setOrigin(0.5).setInteractive();
        mBtn.on('pointerdown', () => this.openMapModal());
        
        let pBtn = this.add.text(400, 360, '   ¡INICIAR RUN!   ', { fontSize: '24px', fill: '#000000', fontWeight: 'bold', backgroundColor: '#f3ef12', padding: 12 }).setOrigin(0.5).setInteractive();
        pBtn.on('pointerdown', () => {
            initAudio();
            currentTrackIndex = Phaser.Math.Between(0, PLAYLIST.length - 1);
            startSynthMusic();
            this.scene.start('GameScene');
        });
    }

    openSkinModal() {
        this.md = this.add.container(0, 0).setDepth(100);
        this.md.add([
            this.add.rectangle(400, 225, 800, 450, 0, 0.85),
            this.add.rectangle(400, 225, 620, 320, 0x0b0614).setStrokeStyle(2, 0xf3ef12)
        ]);
        this.md.add(this.add.text(400, 95, 'SISTEMA DE SKINS', { fontSize: '20px', fill: '#f3ef12', fontFamily: 'Impact' }).setOrigin(0.5));
        
        let cx = [200, 400, 600];
        SKINS.forEach((sk, i) => {
            let x = cx[i];
            let box = this.add.rectangle(x, 190, 160, 120, i === currentSkinIndex ? 0xf3ef12 : 0x1b1426, i === currentSkinIndex ? 0.2 : 0.7).setStrokeStyle(1.5, i === currentSkinIndex ? 0xf3ef12 : 0x443366);
            this.md.add([box, this.add.text(x, 142, sk, { fontSize: '14px', fill: '#fff', fontWeight: 'bold' }).setOrigin(0.5)]);
            
            let pPreview = this.add.graphics();
            let colors = [0xffe0bd, 0xffffff, 0x1a233a];
            if (i === 1) colors = [0xffe0bd, 0x00ffcc, 0x222222];
            else if (i === 2) colors = [0x222222, 0x111111, 0x111111];
            
            pPreview.fillStyle(colors[0], 1).fillCircle(x, 170 - 15, 5);
            pPreview.lineStyle(5, colors[1], 1).lineBetween(x, 175 - 15, x, 188 - 15);
            pPreview.lineStyle(3, colors[2], 1).lineBetween(x, 188 - 15, x - 4, 200 - 15).lineBetween(x, 188 - 15, x + 4, 200 - 15);
            pPreview.lineStyle(2.5, colors[1], 1).lineBetween(x, 178 - 15, x - 6, 188 - 15).lineBetween(x, 178 - 15, x + 6, 188 - 15);
            
            if (i === 0) { pPreview.lineStyle(1.5, 0xff0033, 1).lineBetween(x, 176 - 15, x + 2, 182 - 15); }
            else if (i === 2) { pPreview.fillStyle(0xff0044, 1).fillRect(x - 2, 168 - 15, 4, 1.5); }
            this.md.add(pPreview);

            let rx = i === 2 ? "REQ: 1000 PTS" : "LIBRE";
            let lock = (i === 2 && highScore < 1000);
            let bTx = i === currentSkinIndex ? "[ ACTIVO ]" : (lock ? "🔒 BLOQUEADO" : "[ ELEGIR ]");
            let bCl = i === currentSkinIndex ? "#f3ef12" : (lock ? "#666" : "#00ffff");
            
            this.md.add(this.add.text(x, 202, rx, { fontSize: '10px', fill: i === 2 ? '#ff0055' : '#00ff00' }).setOrigin(0.5));
            let sB = this.add.text(x, 232, bTx, { fontSize: '12px', fill: bCl, fontWeight: 'bold', backgroundColor: '#000', padding: 4 }).setOrigin(0.5).setInteractive();
            this.md.add(sB);
            
            if (!lock) {
                sB.on('pointerdown', () => { 
                    currentSkinIndex = i; 
                    this.skTxt.setText(`SKIN: ${SKINS[currentSkinIndex]} | MAPA: ${MAPS[currentMapIndex].name}`); 
                    this.md.destroy(); 
                    this.openSkinModal(); 
                });
            } else {
                sB.on('pointerdown', () => alert(`Necesitas 1000 pts. Récord: ${Math.floor(highScore)}`));
            }
        });
        
        let cB = this.add.text(400, 345, ' CONFIRMAR SELECCIÓN ', { fontSize: '15px', fill: '#000', fontWeight: 'bold', backgroundColor: '#00ffaa', padding: 8 }).setOrigin(0.5).setInteractive();
        this.md.add(cB); 
        cB.on('pointerdown', () => this.md.destroy());
    }

    openMapModal() {
        this.mdMap = this.add.container(0, 0).setDepth(100);
        this.mdMap.add([
            this.add.rectangle(400, 225, 800, 450, 0, 0.85),
            this.add.rectangle(400, 225, 620, 320, 0x06140b).setStrokeStyle(2, 0x00ffaa)
        ]);
        this.mdMap.add(this.add.text(400, 95, 'SELECCIÓN DE MAPAS', { fontSize: '20px', fill: '#00ffaa', fontFamily: 'Impact' }).setOrigin(0.5));
        
        let cx = [200, 400, 600];
        MAPS.forEach((mp, i) => {
            let x = cx[i];
            let box = this.add.rectangle(x, 190, 160, 120, i === currentMapIndex ? 0x00ffaa : 0x14261b, i === currentMapIndex ? 0.2 : 0.7).setStrokeStyle(1.5, i === currentMapIndex ? 0x00ffaa : 0x336644);
            this.mdMap.add([box, this.add.text(x, 142, mp.name, { fontSize: '14px', fill: '#fff', fontWeight: 'bold' }).setOrigin(0.5)]);
            
            let mPrv = this.add.graphics();
            mPrv.fillStyle(mp.bColor, 1).fillRect(x - 40, 160, 80, 35);
            mPrv.fillStyle(mp.topColor, 1).fillRect(x - 40, 160, 80, 3);
            this.mdMap.add(mPrv);

            let rx = i === 2 ? "REQ: 1000 PTS" : (i === 1 ? "LIBRE" : "LIBRE");
            let lock = (i === 2 && highScore < 1000);
            let bTx = i === currentMapIndex ? "[ ACTIVO ]" : (lock ? "🔒 BLOQUEADO" : "[ ELEGIR ]");
            let bCl = i === currentMapIndex ? "#00ffaa" : (lock ? "#666" : "#00ffff");
            
            this.mdMap.add(this.add.text(x, 202, rx, { fontSize: '10px', fill: lock ? '#ff0055' : '#00ff00' }).setOrigin(0.5));
            let sB = this.add.text(x, 232, bTx, { fontSize: '12px', fill: bCl, fontWeight: 'bold', backgroundColor: '#000', padding: 4 }).setOrigin(0.5).setInteractive();
            this.mdMap.add(sB);
            
            if (!lock) {
                sB.on('pointerdown', () => { 
                    currentMapIndex = i; 
                    this.skTxt.setText(`SKIN: ${SKINS[currentSkinIndex]} | MAPA: ${MAPS[currentMapIndex].name}`); 
                    this.mdMap.destroy(); 
                    this.openMapModal(); 
                });
            } else {
                sB.on('pointerdown', () => alert(`Necesitas 1000 pts para la Fábrica. Récord: ${Math.floor(highScore)}`));
            }
        });
        
        let cB = this.add.text(400, 345, ' CONFIRMAR MAPA ', { fontSize: '15px', fill: '#000', fontWeight: 'bold', backgroundColor: '#00ffaa', padding: 8 }).setOrigin(0.5).setInteractive();
        this.mdMap.add(cB); 
        cB.on('pointerdown', () => this.mdMap.destroy());
    }
}
class GameScene extends Phaser.Scene {
    constructor() { super({ key: 'GameScene' }); }
    
    preload() {
        this.load.crossOrigin = 'anonymous';
        this.load.image('city_bg', 'https://i.postimg.cc/4yM4kq6N/file-000000000a00720e808aec89134ca970.png');
        
        // Tus imágenes realistas
        this.load.image('obs_caja', 'https://i.postimg.cc/cL60gP2n/file-000000009c58720e92ee067dfdb9148a.png');
        this.load.image('obs_antena', 'https://i.postimg.cc/7hDq5hrh/file-00000000c120720eabd54c4cd8479eac.png');
        this.load.image('obs_muro', 'https://i.postimg.cc/WzXct77Y/file-0000000011fc71f5812cce2ec78ae9f2.png');
    }
    
    create() {
        let mp = MAPS[currentMapIndex];
        this.cameras.main.setBackgroundColor(mp.bgColor);
        this.score = 0; 
        this.gameSpeed = 440; 
        this.isGameOver = false; 
        this.animTimeCounter = 0; 
        buildingsSpawnedCount = 0;
        
        this.speedLines = this.add.group();
        this.bgGroup = this.add.group();
        
        if (currentMapIndex === 0) {
            let moonGraphics = this.add.graphics();
            moonGraphics.fillStyle(0xffffff, 0.05).fillCircle(650, 110, 50);
            moonGraphics.fillStyle(0xffffff, 0.1).fillCircle(650, 110, 30);
            moonGraphics.fillStyle(0xffffe6, 0.95).fillCircle(650, 110, 15);
            
            for (let i = 0; i < 11; i++) {
                let bh = Phaser.Math.Between(250, 420);
                let bw = Phaser.Math.Between(100, 160);
                let container = this.add.container(i * 90, 450 - bh);
                
                let g = this.add.graphics().fillStyle(mp.bColor, 1);
                g.fillRect(0, 0, bw, bh); 
                
                let topW = bw * Phaser.Math.FloatBetween(0.4, 0.7);
                let topH = Phaser.Math.Between(20, 70);
                g.fillRect((bw - topW) / 2, -topH, topW, topH);
                
                if (Phaser.Math.Between(0, 1) === 1) {
                    g.fillRect((bw - 4) / 2, -topH - 45, 4, 45);
                }
                
                container.add(g);
                this.bgGroup.add(container);
            }
            
            this.cityBg = this.add.tileSprite(400, 225, 800, 450, 'city_bg');
            this.cityBg.setAlpha(0.85);
            this.add.rectangle(400, 225, 800, 450, 0x05020a, 0.35);
            
        } else {
            this.cityBg = null;
            let sunColor = currentMapIndex === 1 ? 0xffaa00 : 0xffffe6;
            this.add.graphics().fillStyle(0xffffff, 0.01).fillCircle(680, 80, 60).fillStyle(sunColor, 0.85).fillCircle(680, 80, 20);
            
            for (let i = 0; i < 9; i++) {
                let bh = Phaser.Math.Between(260, 390);
                let bw = Phaser.Math.Between(130, 180);
                let container = this.add.container(i * 115, 450 - bh);
                
                if (currentMapIndex === 1) { 
                    container.add(this.add.graphics().fillStyle(mp.bColor, 0.6).fillTriangle(0, bh, bw / 2, 0, bw, bh));
                } else { 
                    container.add(this.add.graphics().fillStyle(mp.bColor, 0.4).fillRect(0, 0, bw, bh));
                }
                this.bgGroup.add(container);
            }
        }
        
        this.platforms = this.physics.add.group({ allowGravity: false, immovable: true });
        this.visualBuildings = this.add.group();
        this.obstacles = this.physics.add.group({ allowGravity: false, immovable: true });
        
        this.spawnBuilding(0, 340, 750);
        this.lastPlatformX = 750;
        this.lastPlatformY = 340;
        
        this.playerContainer = this.add.container(150, 280);
        this.playerBody = this.add.graphics();
        this.playerContainer.add(this.playerBody);
        this.physics.add.existing(this.playerContainer);
        
        this.playerContainer.body.setSize(16, 40).setOffset(-8, -40);
        
        this.physics.add.collider(this.playerContainer, this.platforms);
        this.physics.add.collider(this.playerContainer, this.obstacles, this.hitObstacle, null, this);
        
        this.scoreText = this.add.text(20, 20, `${playerName}: 0`, { fontSize: '20px', fill: '#f3ef12', fontFamily: 'Impact' });
        this.trackText = this.add.text(20, 48, `📻 EN VIVO: ${PLAYLIST[currentTrackIndex].name}`, { fontSize: '12px', fill: '#aa66ff', fontWeight: 'bold' });
        
        this.input.on('pointerdown', () => {
            if (!this.isGameOver && this.playerContainer.body.touching.down) {
                this.playerContainer.body.setVelocityY(-595);
                playSynthSound(160, 380, 0.08, 'triangle', 0.12);
            }
        });
    }
    spawnBuilding(x, y, width) {
        let mp = MAPS[currentMapIndex];
        buildingsSpawnedCount++;
        let height = 450 - y;
        let solidFloor = this.add.rectangle(x, y, width, height).setOrigin(0, 0);
        this.physics.add.existing(solidFloor);
        solidFloor.body.setAllowGravity(false).setImmovable(true);
        solidFloor.width = width;
        this.platforms.add(solidFloor);
        
        let vc = this.add.container(x, y);
        
        if (currentMapIndex === 0) { 
            let gEd = this.add.graphics();
            gEd.fillStyle(0x1a1c23, 1).fillRect(0, 0, width, height);
            gEd.fillStyle(0x2a2d34, 1).fillRect(0, 0, width, 12);
            gEd.fillStyle(0xffcc00, 1);
            for (let sx = 0; sx < width; sx += 30) { 
                gEd.fillRect(sx, 0, 15, 12); 
            }
            vc.add(gEd);
        } else if (currentMapIndex === 1) { 
            let gEd = this.add.graphics().fillStyle(mp.bColor, 1);
            gEd.beginPath(); 
            gEd.moveTo(0, height); 
            gEd.lineTo(0, Phaser.Math.Between(15, 30));
            gEd.lineTo(width / 2, Phaser.Math.Between(-10, 10)); 
            gEd.lineTo(width, Phaser.Math.Between(15, 30));
            gEd.lineTo(width, height); 
            gEd.fillPath();
            vc.add(gEd);
            vc.add(this.add.rectangle(0, 0, width, 3, mp.topColor).setOrigin(0, 0));
        } else { 
            vc.add(this.add.graphics().fillStyle(mp.bColor, 1).fillRect(0, 0, width, height));
            for (let wx = 22; wx < width - 45; wx += 50) {
                for (let wy = 32; wy < height - 60; wy += 65) {
                    if (Phaser.Math.Between(0, 10) > 4) {
                        vc.add(this.add.rectangle(wx, wy, 32, 46, mp.winColor).setAlpha(0.3).setOrigin(0, 0));
                    }
                }
            }
            vc.add(this.add.rectangle(0, 0, width, 3, mp.topColor).setOrigin(0, 0));
        }
        
        vc.customWidth = width;
        this.visualBuildings.add(vc);
        
        if (buildingsSpawnedCount > 2 && width > 380 && Phaser.Math.Between(0, 10) > 3.8) {
            let safeX = x + Phaser.Math.Between(260, width - 70);
            let type = Phaser.Math.Between(0, 2);
            
            let key = 'obs_caja';
            let vW = 85, vH = 85; 
            let hW = 35, hH = 35; // Hitbox más pequeña
            let visOffsetY = 15; // ¡Más enterrado!
            
            if (type === 1) { 
                key = 'obs_antena'; 
                vW = 35; vH = 90; 
                hW = 10; hH = 60; 
                visOffsetY = 8;
            } 
            else if (type === 2) { 
                key = 'obs_muro'; 
                vW = 120; vH = 75; 
                hW = 60; hH = 30; 
                visOffsetY = 12;
            }
            
            let hitbox = this.add.rectangle(safeX, y, hW, hH, 0xff0000, 0).setOrigin(0.5, 1);
            this.physics.add.existing(hitbox);
            hitbox.body.setAllowGravity(false).setImmovable(true);
            
            let sprite = this.add.sprite(safeX, y + visOffsetY, key).setOrigin(0.5, 1);
            sprite.displayWidth = vW;
            sprite.displayHeight = vH;
            
            hitbox.visualSprite = sprite; 
            this.obstacles.add(hitbox);
        }
    }
    
    update(time, delta) {
        if (this.isGameOver) return;
        let dt = delta / 1000;
        this.animTimeCounter += dt * (this.gameSpeed / 45);
        this.animatePlayer();
        
        if (Phaser.Math.Between(0, 100) > 94) {
            this.speedLines.add(this.add.rectangle(850, Phaser.Math.Between(40, 240), Phaser.Math.Between(60, 120), 1.5, 0xffffff).setAlpha(0.15));
        }
        
        this.speedLines.children.entries.forEach(l => {
            l.x -= this.gameSpeed * 1.5 * dt;
            if (l.x < -150) l.destroy();
        });
        
        if (currentMapIndex === 0 && this.cityBg) {
            this.cityBg.tilePositionX += this.gameSpeed * 0.05 * dt;
            this.bgGroup.children.entries.forEach(b => {
                b.x -= this.gameSpeed * 0.04 * dt;
                if (b.x + 180 < 0) b.x = 850;
            });
        } else {
            this.bgGroup.children.entries.forEach(b => {
                b.x -= this.gameSpeed * 0.055 * dt;
                if (b.x + 180 < 0) b.x = 850;
            });
        }
        
        this.platforms.children.entries.forEach(p => {
            p.body.setVelocityX(-this.gameSpeed);
            if (p.x + p.width < 0) p.destroy();
        });
        
        this.visualBuildings.children.entries.forEach(vb => {
            vb.x -= this.gameSpeed * dt;
            if (vb.x + vb.customWidth < 0) vb.destroy();
        });
        
        this.obstacles.children.entries.forEach(o => {
            o.body.setVelocityX(-this.gameSpeed);
            if (o.visualSprite) o.visualSprite.x = o.x; 
            
            if (o.x + 100 < 0) {
                if (o.visualSprite) o.visualSprite.destroy();
                o.destroy();
            }
        });
        
        this.lastPlatformX -= this.gameSpeed * dt;
        
        if (this.lastPlatformX < 850) {
            let rw = Phaser.Math.Between(420, 580);
            let rg = Phaser.Math.Between(75, Math.min(140, this.gameSpeed * 0.26));
            let ny = Phaser.Math.Clamp(this.lastPlatformY + Phaser.Math.Between(-20, 20), 280, 350);
            this.spawnBuilding(this.lastPlatformX + rg, ny, rw);
            this.lastPlatformX += (rg + rw);
            this.lastPlatformY = ny;
        }
        
        this.score += 0.25;
        this.scoreText.setText(`${playerName}: ${Math.floor(this.score)}`);
        this.gameSpeed += 0.05;
        
        if (this.playerContainer.y > 500) this.gameOver();
    }
    
    animatePlayer() {
        this.playerBody.clear();
        let isGrounded = this.playerContainer.body.touching.down;
        let t = this.animTimeCounter;
        let runLean = Math.min(6, (this.gameSpeed / 130));
        let bounce = isGrounded ? Math.abs(Math.sin(t * 2)) * 3.5 : 0;
        
        if (isGrounded && Phaser.Math.Between(0, 10) > 7) {
            let pColor = currentSkinIndex === 2 ? 0xff0044 : 0x00ffff;
            let spark = this.add.rectangle(this.playerContainer.x + (currentSkinIndex === 2 ? -12 : Phaser.Math.Between(-8, 4)), this.playerContainer.y - (currentSkinIndex === 2 ? 34 : 0), 3, 3, pColor).setAlpha(0.7);
            this.tweens.add({targets: spark, x: spark.x - 50, y: spark.y + Phaser.Math.Between(-5, 5), alpha: 0, duration: 300, onComplete: () => spark.destroy()});
        }
        
        let colors = [0xffe0bd, 0xffffff, 0x1a233a];
        if (currentSkinIndex === 1) colors = [0xffe0bd, 0x00ffcc, 0x222222];
        else if (currentSkinIndex === 2) colors = [0x222222, 0x111111, 0x111111];
        
        if (isGrounded) {
            this.playerBody.fillStyle(colors[0], 1).fillCircle(2 + runLean, -44 + bounce, 6.5);
            this.playerBody.lineStyle(6.5, colors[1], 1).lineBetween(2 + runLean, -38 + bounce, 0, -20 + bounce);
            
            if (currentSkinIndex === 0) {
                this.playerBody.fillStyle(0x111111, 1);
                this.playerBody.fillCircle(2 + runLean - 3, -44 + bounce - 5, 4);
                this.playerBody.fillCircle(2 + runLean + 4, -44 + bounce - 6, 4.5);
                this.playerBody.fillCircle(2 + runLean + 6, -44 + bounce - 1, 3.5);
                this.playerBody.fillCircle(2 + runLean - 5, -44 + bounce, 3.5);
                this.playerBody.fillCircle(2 + runLean, -44 + bounce - 7, 4.5);
                this.playerBody.lineStyle(1.5, 0x111111, 1).lineBetween(2 + runLean - 1, -44 + bounce - 1, 2 + runLean + 6, -44 + bounce - 1);
                this.playerBody.lineStyle(2, 0xff0033, 1).lineBetween(2 + runLean, -36 + bounce, 5 + runLean + Math.sin(t) * 2, -26 + bounce);
            } else if (currentSkinIndex === 1) {
                this.playerBody.lineStyle(2, 0xff0055, 1).lineBetween(2 + runLean - 6, -44 + bounce - 4, 2 + runLean + 6, -44 + bounce - 4);
            } else if (currentSkinIndex === 2) {
                this.playerBody.fillStyle(0xff0044, 1).fillRect(-1 + runLean, -46 + bounce, 5, 2);
                this.playerBody.lineStyle(2, 0x111111, 1).lineBetween(2 + runLean - 5, -44 + bounce - 1, 2 + runLean - 14, -44 + bounce - 5 + Math.sin(t * 3) * 3);
            }
            
            this.playerBody.lineStyle(3.5, colors[1], 1);
            let arm = Math.sin(t) * 0.8;
            this.playerBody.lineBetween(1, -34 + bounce, 2 + Math.sin(arm) * 12, -30 + bounce + Math.cos(arm) * 12);
            
            this.playerBody.lineStyle(4, colors[2], 1);
            let l1 = t, lx1 = Math.sin(l1) * 13, ly1 = -20 + bounce + Math.abs(Math.cos(l1)) * 16;
            this.playerBody.lineBetween(0, -20 + bounce, lx1, -11 + bounce).lineBetween(lx1, -11 + bounce, lx1 + Math.sin(t) * 3, Math.min(0, ly1));
            
            let l2 = t + Math.PI, lx2 = Math.sin(l2) * 13, ly2 = -20 + bounce + Math.abs(Math.cos(l2)) * 16;
            this.playerBody.lineBetween(0, -20 + bounce, lx2, -11 + bounce).lineBetween(lx2, -11 + bounce, lx2 + Math.sin(t + Math.PI) * 3, Math.min(0, ly2));
        } else {
            this.playerBody.fillStyle(colors[0], 1).fillCircle(5, -45, 6.5);
            this.playerBody.lineStyle(6.5, colors[1], 1).lineBetween(5, -39, 0, -22);
            
            if (currentSkinIndex === 0) {
                this.playerBody.fillStyle(0x111111, 1);
                this.playerBody.fillCircle(5 - 3, -45 - 6, 4);
                this.playerBody.fillCircle(5 + 4, -45 - 7, 4.5);
                this.playerBody.fillCircle(5 + 6, -45 - 2, 3.5);
                this.playerBody.fillCircle(5 - 5, -45 - 1, 3.5);
                this.playerBody.fillCircle(5, -45 - 8, 4.5);
                this.playerBody.lineStyle(1.5, 0x111111, 1).lineBetween(5 - 1, -45 - 1, 5 + 6, -45 - 1);
                this.playerBody.lineStyle(2, 0xff0033, 1).lineBetween(5, -36, -3, -30);
            } else if (currentSkinIndex === 1) {
                this.playerBody.lineStyle(2, 0xff0055, 1).lineBetween(5 - 6, -45 - 4, 5 + 6, -45 - 4);
            } else if (currentSkinIndex === 2) {
                this.playerBody.fillStyle(0xff0044, 1).fillRect(2, -47, 5, 2);
                this.playerBody.lineStyle(2, 0x111111, 1).lineBetween(5 - 5, -45 - 1, 5 - 12, -45 + 6);
            }
            
            this.playerBody.lineStyle(3.5, colors[1], 1).lineBetween(3, -33, -9, -24);
            this.playerBody.lineStyle(4, colors[2], 1).lineBetween(0, -22, -6, -13).lineBetween(-6, -13, -1, -5);
            this.playerBody.lineStyle(4, colors[2], 1).lineBetween(0, -22, 6, -11).lineBetween(6, -11, 11, -8);
        }
    }
    
    hitObstacle() { this.gameOver(); }
    
    gameOver() {
        this.isGameOver = true;
        this.physics.pause();
        stopSynthMusic();
        playSynthSound(110, 30, 0.4, 'sawtooth', 0.2);
        
        let fs = Math.floor(this.score);
        if (fs > highScore) {
            highScore = fs;
            highScorePlayer = playerName;
            localStorage.setItem('neonRunnerHighScore', highScore);
            localStorage.setItem('neonRunnerHighPlayer', highScorePlayer);
        }
        
        this.add.text(400, 120, 'WASTED / GAME OVER', { fontSize: '36px', fill: '#ff0055', fontFamily: 'Impact', stroke: '#000', strokeThickness: 5 }).setOrigin(0.5);
        this.add.text(400, 175, `SCORE: ${fs} PTS`, { fontSize: '18px', fill: '#ffffff' }).setOrigin(0.5);
        
        let rB = this.add.text(400, 245, ' REINTENTAR RUN ', { fontSize: '20px', fill: '#000', fontWeight: 'bold', backgroundColor: '#f3ef12', padding: 12 }).setOrigin(0.5).setInteractive();
        rB.on('pointerdown', () => {
            currentTrackIndex = (currentTrackIndex + 1) % PLAYLIST.length;
            startSynthMusic();
            this.scene.restart();
        });
        
        let mB = this.add.text(400, 325, ' MENÚ PRINCIPAL ', { fontSize: '16px', fill: '#fff', backgroundColor: '#222', padding: 10 }).setOrigin(0.5).setInteractive();
        mB.on('pointerdown', () => this.scene.start('MainMenu'));
    }
}

const config = {
    type: Phaser.CANVAS,
    width: 800,
    height: 450,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    physics: { default: 'arcade', arcade: { gravity: { y: 1680 }, debug: false } },
    scene: [MainMenu, GameScene]
};

const game = new Phaser.Game(config);

function initAudio() {
    if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSynthSound(fS, fE, d, t, v) {
    if (!audioCtx) return;
    try {
        let o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = t;
        o.frequency.setValueAtTime(fS, audioCtx.currentTime);
        o.frequency.exponentialRampToValueAtTime(fE, audioCtx.currentTime + d);
        g.gain.setValueAtTime(v, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + d);
    } catch (e) {}
}

function startSynthMusic() {
    stopSynthMusic();
    initAudio();
    let tk = PLAYLIST[currentTrackIndex], st = 0, iT = (60000 / tk.bpm) / 2;
    musicInterval = setInterval(() => {
        try {
            let f = 440 * Math.pow(2, (tk.notes[st % tk.notes.length] - 69) / 12);
            let o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'sawtooth';
            o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(0.03, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.2);
            st++;
        } catch (e) {}
    }, iT);
}

function stopSynthMusic() {
    if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
}
</script>
